name: AI News Daily Push

on:
  # 定时触发：北京时间07:30 = UTC 23:30
  schedule:
    - cron: '30 23 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      test_mode:
        description: '测试模式（仅抓取不推送）'
        required: false
        default: 'false'
        type: boolean
      generate_podcast:
        description: '生成播客音频'
        required: false
        default: 'true'
        type: boolean

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install Python dependencies
        run: |
          pip install feedparser requests openai edge-tts pydub
      
      - name: Run AI News Push
        run: python main.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      
      - name: Generate Podcast
        if: github.event.inputs.generate_podcast != 'false'
        run: |
          python podcast_generator.py
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      
      - name: Setup GitHub Pages
        if: github.event.inputs.generate_podcast != 'false'
        run: |
          mkdir -p public
          cp podcasts/*.mp3 public/ 2>/dev/null || true
          
          # 生成 podcast.xml
          cat > public/podcast.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <rss version="2.0" xmlns:itunes="http://www.itunes.com/dtds/podcast-1.0.dtd">
          <channel>
              <title>AI科技早报</title>
              <link>https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}</link>
              <language>zh-CN</language>
              <description>每日AI科技热点，双人对话播报</description>
              <itunes:category text="Technology"/>
              <item>
                  <title>AI科技早报 - $(date '+%Y-%m-%d')</title>
                  <description>今日科技新闻播客版</description>
                  <pubDate>$(date -R)</pubDate>
                  <enclosure url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/podcast.mp3" type="audio/mpeg"/>
              </item>
          </channel>
          </rss>
          EOF
          
          # 重命名MP3为固定名称
          for f in public/*.mp3; do
            mv "$f" public/podcast.mp3 2>/dev/null || true
          done
      
      - name: Deploy to GitHub Pages
        if: github.event.inputs.generate_podcast != 'false'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
      
      - name: Upload report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/
          retention-days: 7
