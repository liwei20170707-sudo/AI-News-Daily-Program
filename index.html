<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI科技早报 - 播客订阅</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .rss-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
        }
        .rss-link {
            display: block;
            background: #667eea;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            margin: 15px 0;
            transition: transform 0.2s;
        }
        .rss-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 10px;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .hosts {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }
        .host {
            text-align: center;
        }
        .host-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 10px;
        }
        .host-male { background: #e3f2fd; }
        .host-female { background: #fce4ec; }
        .host-name { font-weight: 600; color: #333; }
        .host-role { font-size: 12px; color: #888; }
        .features {
            text-align: left;
            margin: 30px 0;
        }
        .features li {
            padding: 8px 0;
            color: #555;
        }
        footer {
            margin-top: 30px;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ AI科技早报</h1>
        <p class="subtitle">每日AI科技热点，双人对话播报</p>
        
        <div class="hosts">
            <div class="host">
                <div class="host-avatar host-male">👨</div>
                <div class="host-name">云希</div>
                <div class="host-role">幽默风趣</div>
            </div>
            <div class="host">
                <div class="host-avatar host-female">👩</div>
                <div class="host-name">晓晓</div>
                <div class="host-role">技术严谨</div>
            </div>
        </div>
        
        <div class="rss-box">
            <p style="margin-bottom: 15px; color: #666;">📱 复制以下链接到播客App订阅：</p>
            <code style="display: block; padding: 10px; background: #e9ecef; border-radius: 8px; word-break: break-all; font-size: 12px;">
                https://liwei20170707-sudo.github.io/AI-program001/podcast.xml
            </code>
            <button class="copy-btn" onclick="copyLink()">📋 复制订阅链接</button>
        </div>
        
        <a href="podcast.xml" class="rss-link">🎧 直接打开RSS订阅</a>
        
        <div class="features">
            <strong>✨ 播客特色：</strong>
            <ul>
                <li>📅 每日早晨7:30自动更新</li>
                <li>🤖 AI智能生成双人对话脚本</li>
                <li>📰 精选IT之家、Hacker News、36氪等热点</li>
                <li>⏱️ 每期约3-5分钟，通勤必听</li>
            </ul>
        </div>
        
        <footer>
            <p>由 AI科技新闻自动推送系统 生成</p>
            <p style="margin-top: 5px;">
                <a href="https://github.com/liwei20170707-sudo/AI-program001" style="color: #667eea;">GitHub仓库</a>
            </p>
        </footer>
    </div>
    
    <script>
        function copyLink() {
            const link = 'https://liwei20170707-sudo.github.io/AI-program001/podcast.xml';
            navigator.clipboard.writeText(link).then(() => {
                alert('✅ 已复制到剪贴板！\n\n请打开播客App，粘贴链接订阅。');
            });
        }
    </script>
</body>
</html>
